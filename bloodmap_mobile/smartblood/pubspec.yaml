name: smartblood
description: "Blood Map PH - Blood Bank Inventory and Emergency Request System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  shimmer: ^3.0.0
  intl: ^0.20.1
  permission_handler: ^11.3.1
  http: ^1.2.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/BLDMP.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/BLDMP.png
    - assets/smartblood_logo.png
